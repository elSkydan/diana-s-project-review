<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>З 50-річчям, мамо!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Якщо Racama недоступний, підключаються елегантні резервні шрифти -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-decor" aria-hidden="true" id="bgDecor"></div>

    <main class="page">
      <section class="hero">
        <h1 class="hero__title">З 50-річчям, мамо</h1>
        <p class="hero__subtitle">Найніжніші слова любові у цей особливий день</p>
      </section>

      <section class="envelope-section" aria-label="Лист-привітання">
        <div class="envelope-wrap" id="envelopeWrap">
          <article class="letter" id="letterCard">
            <h2 class="letter__title">Для найріднішої мами</h2>
            <!-- ТУТ ВСТАВЛЕНО ТОЧНИЙ ТЕКСТ ПРИВІТАННЯ (НЕ ЗМІНЮВАТИ) -->
            <div class="letter__content" id="greetingText">
              [ВСТАВЬ СЮДА ТОЧНЫЙ ТЕКСТ ПОЗДРАВЛЕНИЯ]
            </div>
          </article>

          <button class="envelope" id="envelopeBtn" type="button" aria-expanded="false" aria-controls="letterCard">
            <span class="envelope__flap"></span>
            <span class="envelope__front"></span>
            <span class="envelope__heart" aria-hidden="true">
              <svg viewBox="0 0 100 90" role="img" aria-label="Серце">
                <defs>
                  <linearGradient id="heartGradient" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#ff6b81" />
                    <stop offset="100%" stop-color="#c1121f" />
                  </linearGradient>
                </defs>
                <path
                  d="M50 84C48.5 82.7 47.1 81.5 45.8 80.4C20.2 58.7 4 44.9 4 28.5C4 14.7 15.1 4 28.9 4C36.8 4 44.4 7.7 50 13.5C55.6 7.7 63.2 4 71.1 4C84.9 4 96 14.7 96 28.5C96 44.9 79.8 58.7 54.2 80.4C52.9 81.5 51.5 82.7 50 84Z"
                  fill="url(#heartGradient)"
                />
              </svg>
            </span>
            <span class="sr-only">Відкрити лист</span>
          </button>
        </div>
      </section>

      <section class="party-pop" aria-label="Святкова хлопушка">
        <h2 class="section-title">Натисни для святкового настрою ✨</h2>
        <button class="popper" id="popperBtn" type="button">Хлопушка</button>
        <div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>
      </section>

      <section class="main-photo" aria-label="Головна фотографія">
        <h2 class="section-title">Головна пам’ятна світлина</h2>
        <!-- ДЕ МІНЯТИ ГОЛОВНЕ ФОТО: src у цьому img -->
        <figure class="photo-card photo-card--main" id="mainPhotoCard">
          <img src="assets-img/main-photo.jpg" alt="Головне фото мами" loading="lazy" />
          <!-- ДЕ МІНЯТИ ПІДПИС ГОЛОВНОГО ФОТО -->
          <figcaption>Найтепліший спогад, що завжди у серці.</figcaption>
        </figure>
      </section>

      <section class="gallery-section" aria-label="Галерея фотографій">
        <h2 class="section-title">Ще більше щасливих моментів</h2>
        <div class="gallery-shell">
          <button class="gallery-nav gallery-nav--prev" id="prevSlide" type="button" aria-label="Попереднє фото">
            ‹
          </button>
          <div class="gallery-viewport" id="galleryViewport">
            <div class="gallery-track" id="galleryTrack"></div>
          </div>
          <button class="gallery-nav gallery-nav--next" id="nextSlide" type="button" aria-label="Наступне фото">
            ›
          </button>
        </div>
      </section>

      <section class="cat-section" aria-label="Кіт і любов">
        <div class="cat-wrap">
          <svg class="art-cat" viewBox="0 0 360 220" role="img" aria-label="Стилізований чорний кіт з жовтими очима">
            <defs>
              <linearGradient id="catShine" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#222" />
                <stop offset="100%" stop-color="#080808" />
              </linearGradient>
            </defs>
            <ellipse cx="160" cy="145" rx="118" ry="56" fill="url(#catShine)" />
            <ellipse cx="222" cy="95" rx="70" ry="52" fill="url(#catShine)" />
            <path d="M170 62L193 18L210 67Z" fill="#111" />
            <path d="M235 65L264 21L272 73Z" fill="#111" />
            <ellipse cx="204" cy="95" rx="17" ry="14" fill="#f4d35e" />
            <ellipse cx="246" cy="95" rx="17" ry="14" fill="#f4d35e" />
            <ellipse cx="206" cy="95" rx="4.5" ry="8" fill="#111" />
            <ellipse cx="248" cy="95" rx="4.5" ry="8" fill="#111" />
            <path d="M226 108Q223 116 218 108" stroke="#c9c9c9" stroke-width="2" fill="none" />
            <path d="M188 111H148M188 118H142M188 104H152" stroke="#b8b8b8" stroke-linecap="round" stroke-width="2" />
            <path d="M261 111H302M261 118H308M261 104H298" stroke="#b8b8b8" stroke-linecap="round" stroke-width="2" />
            <path d="M66 148Q24 124 20 88" stroke="#101010" stroke-width="16" stroke-linecap="round" fill="none" />
          </svg>
          <p class="cat-love">I love you</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
